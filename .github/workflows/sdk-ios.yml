name: iOS SDK CI/CD # UI Restore Trigger

on:
  push:
    branches: [main]
    paths:
      - 'sdk/ios/**'
      - '.github/workflows/sdk-ios.yml'
    tags:
      - 'sdk-ios-v*'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/ios/**'
      - '.github/workflows/sdk-ios.yml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: macos-14  # Apple Silicon, Xcode 15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift Package dependencies
        working-directory: sdk/ios
        run: swift package resolve

      - name: Build SDK
        working-directory: sdk/ios
        run: |
          xcodebuild build \
            -scheme InviteSDK \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Release

      - name: Run unit tests
        working-directory: sdk/ios
        run: |
          xcodebuild test \
            -scheme InviteSDK \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'

  release:
    name: GitHub Release + CocoaPods + SPM
    runs-on: macos-14
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/sdk-ios-v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#sdk-ios-v}" >> "$GITHUB_OUTPUT"

      - name: Update podspec version
        working-directory: sdk/ios
        run: |
          sed -i '' "s/s.version *= *'[^']*'/s.version = '${{ steps.version.outputs.VERSION }}'/" ShareInstalls.podspec

      - name: Validate podspec
        working-directory: sdk/ios
        run: pod spec lint ShareInstalls.podspec --allow-warnings

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "iOS SDK v${{ steps.version.outputs.VERSION }}"
          body: |
            ## iOS SDK v${{ steps.version.outputs.VERSION }}

            ### Swift Package Manager
            Add via Xcode → **File → Add Package Dependencies**:
            ```
            https://github.com/ceeyang/share-installs
            ```
            Or in `Package.swift`:
            ```swift
            .package(
                url: "https://github.com/ceeyang/share-installs.git",
                from: "${{ steps.version.outputs.VERSION }}"
            )
            ```

            ### CocoaPods
            ```ruby
            pod 'ShareInstalls', '~> ${{ steps.version.outputs.VERSION }}'
            ```
          draft: false
          prerelease: false

      - name: Publish to CocoaPods Trunk
        working-directory: sdk/ios
        run: pod trunk push ShareInstalls.podspec --allow-warnings
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
