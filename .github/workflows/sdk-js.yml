name: JS SDK CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'sdk/js/**'
      - '.github/workflows/sdk-js.yml'
    tags:
      - 'sdk-js-v*'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/js/**'
      - '.github/workflows/sdk-js.yml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdk/js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build:all

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/sdk-js-v')
    permissions:
      contents: read
      id-token: write  # for npm provenance

    defaults:
      run:
        working-directory: sdk/js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#sdk-js-v}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Build
        run: npm run build:all

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
