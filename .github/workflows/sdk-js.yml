name: JS SDK CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'sdk/js/**'
      - '.github/workflows/sdk-js.yml'
    tags:
      - 'sdk-js-v*'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/js/**'
      - '.github/workflows/sdk-js.yml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdk/js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build:all

  publish:
    name: Publish to npm + CDN Release
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/sdk-js-v')
    permissions:
      contents: write
      id-token: write  # for npm provenance

    defaults:
      run:
        working-directory: sdk/js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#sdk-js-v}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Build (ESM + CJS + types + UMD)
        run: npm run build:all

      # Publish to npm — jsDelivr and unpkg serve from npm automatically
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Attach UMD bundle to GitHub Release for direct download / self-hosting
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JS SDK v${{ steps.version.outputs.VERSION }}"
          files: |
            sdk/js/dist/umd/share-installs-sdk.min.js
            sdk/js/dist/umd/share-installs-sdk.min.js.map
          body: |
            ## JS SDK v${{ steps.version.outputs.VERSION }}

            ### npm
            ```bash
            npm install @ceeyang/share-installs
            ```

            ### CDN (jsDelivr) — 推荐
            ```html
            <script src="https://cdn.jsdelivr.net/npm/@ceeyang/share-installs@${{ steps.version.outputs.VERSION }}/dist/umd/share-installs-sdk.min.js"></script>
            ```

            ### CDN (unpkg)
            ```html
            <script src="https://unpkg.com/@ceeyang/share-installs@${{ steps.version.outputs.VERSION }}/dist/umd/share-installs-sdk.min.js"></script>
            ```

            ### 直接下载
            Release 附件中包含 `share-installs-sdk.min.js`，可直接托管到自己的服务器。

            ### 使用示例
            ```html
            <script src="https://cdn.jsdelivr.net/npm/@ceeyang/share-installs@${{ steps.version.outputs.VERSION }}/dist/umd/share-installs-sdk.min.js"></script>
            <script>
              const sdk = new ShareInstalls.ShareInstallsSDK({
                apiBaseUrl: 'https://your-api.com'
              });
              sdk.trackClick('INVITE_CODE');
            </script>
            ```
