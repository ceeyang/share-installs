name: Android SDK CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'sdk/android/**'
      - '.github/workflows/sdk-android.yml'
    tags:
      - 'sdk-android-v*'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/android/**'
      - '.github/workflows/sdk-android.yml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('sdk/android/**/*.gradle*', 'sdk/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run unit tests
        working-directory: sdk/android
        run: ./gradlew :invitesdk:test

      - name: Lint
        working-directory: sdk/android
        run: ./gradlew :invitesdk:lint

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/sdk-android-v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#sdk-android-v}" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        working-directory: sdk/android
        run: ./gradlew :invitesdk:publishReleasePublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SDK_VERSION: ${{ steps.version.outputs.VERSION }}
