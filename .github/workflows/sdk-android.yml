name: Android SDK CI/CD # UI Restore Trigger

on:
  push:
    branches: [main]
    paths:
      - 'sdk/android/**'
      - '.github/workflows/sdk-android.yml'
    tags:
      - 'sdk-android-v*'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/android/**'
      - '.github/workflows/sdk-android.yml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        working-directory: sdk/android
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('sdk/android/**/*.gradle*', 'sdk/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run unit tests
        working-directory: sdk/android
        run: ./gradlew :invitesdk:test

      - name: Lint
        working-directory: sdk/android
        run: ./gradlew :invitesdk:lint

  publish:
    name: Publish to Maven Central + GitHub Packages
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/sdk-android-v')
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        working-directory: sdk/android
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#sdk-android-v}" >> "$GITHUB_OUTPUT"

      # Publish to Maven Central via vanniktech plugin
      # Requires secrets: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
      #                   GPG_SIGNING_KEY (base64), GPG_SIGNING_PASSWORD
      - name: Publish to Maven Central
        working-directory: sdk/android
        run: ./gradlew :invitesdk:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          SDK_VERSION: ${{ steps.version.outputs.VERSION }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      # Also publish to GitHub Packages as a mirror
      - name: Publish to GitHub Packages
        working-directory: sdk/android
        run: ./gradlew :invitesdk:publishReleasePublicationToGitHubPackagesRepository
        env:
          SDK_VERSION: ${{ steps.version.outputs.VERSION }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Android SDK v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Android SDK v${{ steps.version.outputs.VERSION }}

            ### Gradle (Maven Central)
            ```kotlin
            implementation("io.github.share-installs:sdk-android:${{ steps.version.outputs.VERSION }}")
            ```

            ### Gradle (GitHub Packages)
            ```kotlin
            implementation("io.github.share-installs:sdk-android:${{ steps.version.outputs.VERSION }}")
            ```
            Add to your `settings.gradle.kts`:
            ```kotlin
            maven("https://maven.pkg.github.com/ceeyang/share-installs") {
                credentials {
                    username = providers.gradleProperty("gpr.user").orNull ?: System.getenv("GITHUB_ACTOR")
                    password = providers.gradleProperty("gpr.key").orNull ?: System.getenv("GITHUB_TOKEN")
                }
            }
            ```
