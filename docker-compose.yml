# share-installs – Docker Compose
#
# Quick start (test/prod-like):
#   docker compose up --build
#
# Development (hot-reload):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Services:
#   traefik   :80/:443  – 反向代理 + 自动 HTTPS (Let's Encrypt)
#   dashboard :内部      – Vue SPA (nginx, proxies /auth + /dashboard to backend)
#   backend   :6066     – REST API
#   db        :5432     – PostgreSQL 16
#   redis     :6379     – Redis 7

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme-data:/acme
    restart: unless-stopped
    networks:
      - share-net

  dashboard:
    build:
      context: ./dashboard
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS 重定向
      - "traefik.http.routers.dashboard-http.rule=Host(`console.share-installs.com`)"
      - "traefik.http.routers.dashboard-http.entrypoints=web"
      - "traefik.http.routers.dashboard-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      # HTTPS 路由
      - "traefik.http.routers.dashboard-https.rule=Host(`console.share-installs.com`)"
      - "traefik.http.routers.dashboard-https.entrypoints=websecure"
      - "traefik.http.routers.dashboard-https.tls=true"
      - "traefik.http.routers.dashboard-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - share-net

  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "${BACKEND_PORT:-6066}:6066"
    environment:
      NODE_ENV: production
      PORT: 6066
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/share_installs
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: "si:"
      MULTI_TENANT: ${MULTI_TENANT:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FINGERPRINT_MATCH_THRESHOLD: ${FINGERPRINT_MATCH_THRESHOLD:-0.75}
      FINGERPRINT_MATCH_TTL_HOURS: ${FINGERPRINT_MATCH_TTL_HOURS:-72}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - share-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6066/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: share_installs
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d share_installs"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - share-net

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - share-net

volumes:
  postgres-data:
  redis-data:
  acme-data:

networks:
  share-net:
    driver: bridge
