server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 所有 API 请求统一走 /api/ 前缀，nginx 自动去掉前缀后转发到后端
    # /api/health          → backend:3000/health
    # /api/auth/github     → backend:3000/auth/github
    # /api/v1/resolutions  → backend:3000/v1/resolutions
    # /api/dashboard/me    → backend:3000/dashboard/me
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }

    # SPA routing — 所有未匹配路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
