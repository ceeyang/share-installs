server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 所有 API 请求走 /api/ 前缀，原样转发到后端（不剥离前缀）
    # /api/health          → backend:3000/api/health
    # /api/auth/github     → backend:3000/api/auth/github
    # /api/v1/resolutions  → backend:3000/api/v1/resolutions
    # /api/dashboard/me    → backend:3000/api/dashboard/me
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }

    # SPA routing — 所有未匹配路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
